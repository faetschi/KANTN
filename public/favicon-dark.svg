<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#1e293b"/>
  <g fill="none" stroke="url(#g)" stroke-width="6" stroke-linecap="round">
    <!-- Left weight plates -->
    <rect x="6" y="28" width="12" height="44" rx="3" fill="url(#g)" stroke="none"/>
    <rect x="14" y="22" width="8" height="56" rx="3" fill="url(#g)" stroke="none"/>
    <!-- Right weight plates -->
    <rect x="82" y="28" width="12" height="44" rx="3" fill="url(#g)" stroke="none"/>
    <rect x="78" y="22" width="8" height="56" rx="3" fill="url(#g)" stroke="none"/>
    <!-- Barbell bar -->
    <line x1="20" y1="50" x2="80" y2="50" stroke="url(#g)"/>
  </g>
</svg>
